name: Dev build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Newer pushes supersede in-flight dev builds.
concurrency:
  group: dev-build
  cancel-in-progress: true

jobs:
  devbuild:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build DMG + Windows installer
        run: |
          brew install makensis
          make dist VERSION=dev
          make windows VERSION=dev

      - name: Publish rolling "dev" pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create dev \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest dev build" \
            --notes "Built from the latest \`main\` (${GITHUB_SHA:0:7}). Unsigned and untested — for trying things out, not for general use." \
            --prerelease \
            --target "$GITHUB_SHA" \
            dist/Setzer-dev.dmg \
            dist/Setzer-Setup-dev.exe
